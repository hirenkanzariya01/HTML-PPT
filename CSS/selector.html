<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />


  <style>
    button {
      color: white;
      padding: 15px 30px;
      margin: 10px 20px;
      border-radius: 30px;
      font-size: 20px;
    }

    .cart-btn {
      background-color: rgba(255, 183, 0, 0.988);
      border: 5px solid rgba(255, 183, 0, 0.988);
    }

    .cart-btn:hover {
      background-color: chocolate;
      border: 5px solid rgba(255, 183, 0, 0.988);
    }

    .fav-btn {
      background-color: rgb(68, 130, 230);
    }

    .fav-btn:hover {
      background-color: rgb(38, 0, 255);
      border: 5px solid rgb(68, 130, 230);
    }
  </style>
</head>

<body>
  <button class="cart-btn" id="btn"><i class="fa-solid fa-cart-arrow-down"></i> Add to Cart</button>
  <button class="fav-btn"><i class="fa-solid fa-heart"></i> Add to Favirote</button>
</body>

</html>
